stages:
  - build
  - test
  - package
  - deploy

compile_code:
  stage: build
  script:
    - echo "Compiling code..."
    - mvn clean compile

run_tests:
  stage: test
  script:
    - echo "Running tests..."
    - mvn test

create_jar:
  stage: package
  script:
    - echo "Creating JAR file..."
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "staging" || $CI_COMMIT_BRANCH == "dev"

deploy_dev:
  stage: deploy
  script:
    - echo "Stopping DEV process on port $DEV_PORT..."
    - fuser -k $DEV_PORT/tcp || true
    - pkill -f "server.port=$DEV_PORT" || true
    - echo "Staring DEV..."
    - nohup java -jar target/*.jar --server.port=$DEV_PORT > dev.log 2>&1 & 
  environment:
    name: development
    url: http://$PROD_SERVER_IP:$DEV_PORT
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

deploy_staging:
  stage: deploy
  script: 
    - echo "Stopping STAGING process on port $STAGING_PORT..."
    - pkill -f "server.port=$STAGING_PORT" || true
    - echo "Staring STAGING..."
    - nohup java -jar target/*.jar --server.port=$STAGING_PORT > staging.log 2>&1 &
  environment:
    name: staging
    url: http://$PROD_SERVER_IP:$STAGING_PORT
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

deploy_prod:
  stage: deploy
  script:
    - echo "Stopping PROD process on port $PROD_PORT..."
    - pkill -f "server.port=$PROD_PORT" || true
    - echo "Staring PROD..."
    - nohup java -jar target/*.jar --server.port=$PROD_PORT > prod.log 2>&1 &
  environment:
    name: production
    url: http://$PROD_SERVER_IP:$PROD_PORT
  rules:
    - if: $CI_COMMIT_BRANCH == "master"