stages:
  - build
  - test
  - package
  - deploy

compile_code:
  stage: build
  script:
    - echo "Compiling code..."
    - mvn clean compile

run_tests:
  stage: test
  script:
    - echo "Running tests..."
    - mvn test

create_jar:
  stage: package
  script:
    - echo "Creating JAR file..."
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1h

deploy_app:
  stage: deploy
  script:
    - echo "Stopping existing application..."
    - sudo fuser -k 8080/tcp || true
    - echo "Deploying new application..."
    - nohup java -jar target/*.jar --server.port=$PROD_PORT> app.log 2>&1 &
    - sleep 10
    - echo "Application deployed successfully!"
  environment:
    name: production
    url: http://$PROD_SERVER_IP:$PROD_PORT
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
