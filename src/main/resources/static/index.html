<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главно табло - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 d-none d-md-block sidebar p-0">
                <div class="p-3 text-center">
                    <h3 class="text-info"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                </div>
                <nav class="nav flex-column mt-4">
                    <a class="nav-link active" href="index.html"><i class="bi bi-speedometer2"></i> Главно табло</a>
                    <a class="nav-link" href="students.html"><i class="bi bi-people"></i> Студенти</a>
                    <a class="nav-link" href="specialties.html"><i class="bi bi-grid"></i> Специалности</a>
                    <a class="nav-link" href="professors.html"><i class="bi bi-person-badge"></i> Преподаватели</a>
                </nav>
            </div>

            <div class="col-md-10 ms-sm-auto p-4">
                <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Главно табло</h2>
                
                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <div class="card bg-primary text-white h-100 shadow-sm border-0">
                            <div class="card-body d-flex align-items-center">
                                <div class="flex-grow-1">
                                    <h5 class="card-title">Студенти</h5>
                                    <h2 id="total-students" class="display-4 fw-bold">-</h2>
                                </div>
                                <i class="bi bi-people-fill display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-info text-white h-100 shadow-sm border-0">
                            <div class="card-body d-flex align-items-center">
                                <div class="flex-grow-1">
                                    <h5 class="card-title">Специалности</h5>
                                    <h2 id="total-specialties" class="display-4 fw-bold">-</h2>
                                </div>
                                <i class="bi bi-mortarboard-fill display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-warning text-dark h-100 shadow-sm border-0">
                            <div class="card-body d-flex align-items-center">
                                <div class="flex-grow-1">
                                    <h5 class="card-title">Преподаватели</h5>
                                    <h2 id="total-professors" class="display-4 fw-bold">-</h2>
                                </div>
                                <i class="bi bi-person-video3 display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-7">
                        <div class="card bg-dark text-light border-secondary shadow-sm">
                            <div class="card-body text-center p-4">
                                <h5 class="card-title text-start mb-4"><i class="bi bi-bar-chart-line"></i> Разпределение на студентите</h5>
                                <canvas id="studentsChart" height="250"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="card bg-dark text-light border-secondary shadow-sm">
                            <div class="card-body p-4">
                                <h5 class="card-title mb-4"><i class="bi bi-clock-history"></i> Последни регистрации</h5>
                                <div id="recent-students-list" class="list-group list-group-flush">
                                    <div class="text-center p-3">Зареждане...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Зареждане на общия брой студенти и последните 5 регистрации
            fetch('/api/students?size=5&page=0')
                .then(response => response.json())
                .then(data => {
                    // Използваме totalElements за общия брой
                    document.getElementById('total-students').textContent = data.totalElements;

                    const listContainer = document.getElementById('recent-students-list');
                    listContainer.innerHTML = '';

                    // Студентите са в data.content
                    data.content.forEach(student => {
                        const item = document.createElement('div');
                        item.className = 'list-group-item bg-dark text-light border-secondary d-flex justify-content-between align-items-center py-3';
                        item.innerHTML = `
                            <div>
                                <i class="bi bi-person-circle text-primary me-2"></i>
                                <strong>${student.firstName} ${student.lastName}</strong>
                            </div>
                            <span class="badge bg-secondary rounded-pill">${student.facultyNumber}</span>
                        `;
                        listContainer.appendChild(item);
                    });
                })
                .catch(err => {
                    console.error("Грешка при студентите:", err);
                    document.getElementById('total-students').textContent = "0";
                });

            // 2. Зареждане на другите броячи
            fetch('/api/specialties').then(r => r.json()).then(data => {
                document.getElementById('total-specialties').textContent = data.length || 0;
            });
            fetch('/api/professors').then(r => r.json()).then(data => {
                document.getElementById('total-professors').textContent = data.length || 0;
            });

            // 3. Инициализиране на графиката (примерна)
            const ctx = document.getElementById('studentsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Java Spring Boot', 'Networking', 'DevOps'],
                    datasets: [{
                        label: 'Брой студенти',
                        data: [12, 19, 7],
                        backgroundColor: '#0dcaf0'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    },
                    scales: {
                        y: { ticks: { color: '#adb5bd' }, grid: { color: '#444' } },
                        x: { ticks: { color: '#adb5bd' }, grid: { display: false } }
                    }
                }
            });
        });
    </script>
</body>
</html>
