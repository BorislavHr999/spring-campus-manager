<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOS - v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .card-custom { background-color: #2d2d2d; border: 1px solid #3d3d3d; border-radius: 15px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-custom:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="#" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-shield-lock me-3"></i> Сигурност</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light">Аналитичен Център</h1>
                    <div class="btn-toolbar mb-2 mb-md-0 d-flex gap-2">
                        <button id="add-student-btn" class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm">
                            <i class="bi bi-person-plus-fill me-1"></i> Симулирай записване
                        </button>
                        <span class="badge bg-primary px-3 py-2 fs-6 rounded-pill d-flex align-items-center"><i class="bi bi-rocket-takeoff me-2"></i> Версия 2.0 (DEV)</span>
                    </div>
                </div>

                <div class="row mb-5">
                    <div class="col-md-6">
                        <div class="card card-custom p-4 shadow-sm">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted text-uppercase mb-1">Регистрирани студенти</h6>
                                    <h2 class="mb-0 fw-bold" id="total-students">
                                        <span class="spinner-border spinner-border-sm text-primary"></span>
                                    </h2>
                                </div>
                                <div class="bg-primary bg-opacity-25 p-3 rounded-circle">
                                    <i class="bi bi-people-fill fs-3 text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card card-custom p-4 shadow-sm">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted text-uppercase mb-1">Активни курсове</h6>
                                    <h2 class="mb-0 fw-bold" id="active-courses">
                                        <span class="spinner-border spinner-border-sm text-success"></span>
                                    </h2>
                                </div>
                                <div class="bg-success bg-opacity-25 p-3 rounded-circle">
                                    <i class="bi bi-journal-bookmark-fill fs-3 text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <h4 class="mb-3 fw-light">Последни системни активности</h4>
                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">Студент</th>
                                <th class="py-3">Фак. Номер</th>
                                <th class="py-3">Имейл</th>
                                <th class="py-3">Статус</th>
                            </tr>
                        </thead>
                        <tbody id="latest-students-tbody">
                            <tr>
                                <td colspan="4" class="text-center py-4">
                                    <span class="spinner-border spinner-border-sm text-secondary me-2"></span> Зареждане на данни...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            
            function loadStats() {
                
                fetch('/api/dashboard/stats')
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('total-students').innerText = data.totalStudents;
                        document.getElementById('active-courses').innerText = data.activeCourses;
                    })
                    .catch(error => console.error('Грешка при зареждане на статистика:', error));

                
                fetch('/api/dashboard/latest-students')
                    .then(response => response.json())
                    .then(students => {
                        let tableBody = document.getElementById('latest-students-tbody');
                        tableBody.innerHTML = ''; 
                        
                        
                        if (students.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Няма записани студенти все още.</td></tr>';
                            return;
                        }

                        
                        students.forEach(student => {
                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3"><i class="bi bi-person-circle me-2 text-secondary"></i> ${student.firstName} ${student.lastName}</td>
                                <td><span class="text-info">${student.facultyNumber}</span></td>
                                <td class="text-muted">${student.email}</td>
                                <td><span class="badge bg-success bg-opacity-75 px-2 py-1 rounded-pill">Нов запис</span></td>
                            </tr>
                            `;
                            tableBody.innerHTML += row; 
                        });
                    })
                    .catch(error => console.error('Грешка при зареждане на таблицата:', error));
            }

            
            loadStats();

            
            document.getElementById('add-student-btn').addEventListener('click', function() {
                let btn = this;
                let originalText = btn.innerHTML;
                
                
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Обработка...';
                btn.disabled = true;

                
                fetch('/api/dashboard/add-demo-student', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        
                        loadStats();
                    })
                    .finally(() => {
                        
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            });
        });
    </script>
</body>
</html>
