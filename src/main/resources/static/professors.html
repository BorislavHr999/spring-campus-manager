<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преподаватели - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-person-workspace me-3"></i> Преподаватели</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-person-workspace me-2"></i> Академичен състав</h1>
                    <button class="btn btn-outline-warning btn-sm rounded-pill px-3 shadow-sm text-white" onclick="openCreateModal()">
                        <i class="bi bi-person-plus-fill me-1"></i> Нов Преподавател
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3">Служебен Имейл</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-professors-tbody">
                            <tr>
                                <td colspan="4" class="text-center py-4">
                                    <span class="spinner-border spinner-border-sm text-secondary me-2"></span> Зареждане на данни...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="professorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Регистрация на преподавател</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="professorForm">
                        <input type="hidden" id="profId"> <div class="mb-3">
                            <label class="form-label text-muted small">Академична титла</label>
                            <select class="form-select" id="profTitle" required>
                                <option value="ас.">асистент (ас.)</option>
                                <option value="гл. ас. д-р">главен асистент (гл. ас. д-р)</option>
                                <option value="доц. д-р">доцент (доц. д-р)</option>
                                <option value="проф. д-р">професор (проф. д-р)</option>
                                <option value="акад.">академик (акад.)</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Име</label>
                                <input type="text" class="form-control" id="profFirstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Фамилия</label>
                                <input type="text" class="form-control" id="profLastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Служебен имейл</label>
                            <input type="email" class="form-control" id="profEmail" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-warning" id="save-professor-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const professorModal = new bootstrap.Modal(document.getElementById('professorModal'));

            // 1. Зареждане на преподавателите
            window.loadProfessors = function() {
                fetch('/api/dashboard/all-professors')
                    .then(r => r.json())
                    .then(data => {
                        let tableBody = document.getElementById('all-professors-tbody');
                        tableBody.innerHTML = '';
                        
                        if (data.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Няма въведени преподаватели.</td></tr>';
                            return;
                        }

                       data.forEach((p, index) => {
                            let rowNumber = index + 1;
                            let displayTitle = p.title ? p.title + ' ' : '';
                            
                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3 text-secondary">#${p.id}</td>
                                <td><i class="bi bi-person-badge-fill me-2 text-warning"></i> <strong>${displayTitle}${p.firstName} ${p.lastName}</strong></td>
                                <td class="text-info"><a href="mailto:${p.email}" class="text-decoration-none text-info">${p.email}</a></td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-light btn-sm rounded-circle me-2" 
                                            onclick="openEditModal(${p.id}, '${p.title || 'ас.'}', '${p.firstName}', '${p.lastName}', '${p.email}')" title="Редактирай">
                                        <i class="bi bi-pencil-fill"></i>
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteProf(${p.id})" title="Изтрий">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </td>
                            </tr>`;
                            tableBody.innerHTML += row;
                        });
                    });
            };

            window.loadProfessors();

            // 2. Триене
            window.deleteProf = function(id) {
                if(confirm('Сигурен ли си, че искаш да изтриеш този преподавател?')) {
                    fetch('/api/dashboard/delete-professor/' + id, { method: 'DELETE' })
                        .then(() => loadProfessors());
                }
            };

            // 3. Отваряне за ДОБАВЯНЕ
            window.openCreateModal = function() {
                document.getElementById('modalTitle').innerText = "Добавяне на нов преподавател";
                document.getElementById('profId').value = "";
                document.getElementById('professorForm').reset();
                professorModal.show();
            };

            // 4. Отваряне за РЕДАКТИРАНЕ
            window.openEditModal = function(id, title, firstName, lastName, email) {
                document.getElementById('modalTitle').innerText = "Редактиране на преподавател";
                document.getElementById('profId').value = id;
                document.getElementById('profTitle').value = title;
                document.getElementById('profFirstName').value = firstName;
                document.getElementById('profLastName').value = lastName;
                document.getElementById('profEmail').value = email;
                professorModal.show();
            };

            // 5. Записване (POST за нов, PUT за съществуващ)
            document.getElementById('save-professor-btn').addEventListener('click', function() {
                let id = document.getElementById('profId').value;
                let profData = {
                    title: document.getElementById('profTitle').value,
                    firstName: document.getElementById('profFirstName').value,
                    lastName: document.getElementById('profLastName').value,
                    email: document.getElementById('profEmail').value
                };

                let url = id ? '/api/dashboard/update-professor/' + id : '/api/dashboard/add-real-professor';
                let method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(profData)
                }).then(() => {
                    professorModal.hide();
                    loadProfessors();
                }).catch(error => console.error('Грешка:', error));
            });
        });
    </script>
</body>
</html>
