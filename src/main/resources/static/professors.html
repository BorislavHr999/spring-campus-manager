<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преподаватели - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-person-workspace me-3"></i> Преподаватели</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-person-workspace me-2"></i> Академичен състав</h1>
                    
                    <button class="btn btn-outline-warning btn-sm rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#professorModal">
                        <i class="bi bi-person-plus-fill me-1"></i> Нов Преподавател
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3">Имейл</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-professors-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="professorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-person-badge me-2"></i> Регистрация на преподавател</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="professorForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Титла</label>
                            <select class="form-select" id="title">
                                <option value="Асистент">Асистент</option>
                                <option value="Гл. Асистент">Гл. Асистент</option>
                                <option value="Доцент">Доцент</option>
                                <option value="Професор">Професор</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Име</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Фамилия</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Служебен имейл</label>
                            <input type="email" class="form-control" id="email" required placeholder="name@campus.bg">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-warning text-dark fw-bold" id="save-professor-btn">Запиши в базата</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. Зареждане
            window.loadAllProfessors = function() {
                fetch('/api/professors')
                    .then(response => response.json())
                    .then(professors => {
                        let tableBody = document.getElementById('all-professors-tbody');
                        tableBody.innerHTML = ''; 
                        if (professors.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Няма регистрирани преподаватели.</td></tr>';
                            return;
                        }
                        professors.forEach(prof => {
                            // Ако няма титла (title) в Entity-то ти, просто ще пише 'undefined', можеш да го махнеш отдолу
                            let titleStr = prof.title ? `<span class="badge bg-secondary me-1">${prof.title}</span>` : '';
                            
                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3 text-secondary">#${prof.id}</td>
                                <td class="fw-bold text-light">${titleStr} ${prof.firstName} ${prof.lastName}</td>
                                <td class="text-muted"><i class="bi bi-envelope me-1"></i> ${prof.email}</td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteProfessor(${prof.id})" title="Изтрий">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </td>
                            </tr>
                            `;
                            tableBody.innerHTML += row;
                        });
                    });
            };

            window.loadAllProfessors();

            // 2. Триене
            window.deleteProfessor = function(id) {
                if(confirm('Сигурен ли си, че искаш да изтриеш този преподавател?')) {
                    fetch('/api/professors/' + id, { method: 'DELETE' })
                        .then(() => window.loadAllProfessors());
                }
            };

            // 3. Запазване
            document.getElementById('save-professor-btn').addEventListener('click', function() {
                let newProf = {
                    title: document.getElementById('title').value,
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value
                };

                fetch('/api/professors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProf)
                })
                .then(response => {
                     if (!response.ok) throw new Error('Грешка при запис на сървъра');
                     return response.json();
                })
                .then(data => {
                    let modalElement = document.getElementById('professorModal');
                    let modalInstance = bootstrap.Modal.getInstance(modalElement);
                    modalInstance.hide();
                    
                    document.getElementById('professorForm').reset();
                    window.loadAllProfessors();
                })
                .catch(error => {
                    console.error('Грешка при запис:', error);
                    alert("Възникна грешка при запазването на преподавателя.");
                });
            });
        });
    </script>
</body>
</html>
