<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преподаватели - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #ffc107, #fd7e14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #ffc107; box-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
    <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
</a>
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span data-i18n="nav_dashboard">Главно табло</span></a>
                        <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span data-i18n="nav_students">Студенти</span></a>
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span data-i18n="nav_courses">Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-warning text-dark rounded border-0 fw-bold"><i class="bi bi-person-workspace me-3"></i> <span data-i18n="nav_prof">Преподаватели</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-person-badge me-2 text-warning"></i> <span data-i18n="nav_prof">Преподаватели</span></h1>
                    <button id="btn-new-professor" class="btn btn-outline-warning btn-sm rounded-pill px-3 shadow-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-circle-fill me-1"></i> Нов Преподавател
                    </button>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Име</th>
                                <th class="py-3">Фамилия</th>
                                <th class="py-3">Титла</th>
                                <th class="py-3 text-end px-4" id="th-action">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-professors-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="profModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-person-plus me-2 text-warning"></i> Преподавател</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="profForm">
                        <input type="hidden" id="profId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Име</label>
                                <input type="text" class="form-control" id="profFirstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Фамилия</label>
                                <input type="text" class="form-control" id="profLastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Академична титла</label>
                            <input type="text" class="form-control" id="profTitle" placeholder="напр. Проф., Доц., Д-р" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-warning text-dark fw-bold px-4" id="save-prof-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let isAdmin = false;

            // 1. Проверка на правата
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                    
                    if (!isAdmin) {
                        let newBtn = document.getElementById('btn-new-professor');
                        let actionTh = document.getElementById('th-action');
                        if(newBtn) newBtn.style.display = 'none';
                        if(actionTh) actionTh.style.display = 'none';
                    }

                    // 2. Зареждане на таблицата
                    window.loadProfessors();
                })
                .catch(err => {
                    console.error("Грешка при проверка:", err);
                    window.loadProfessors();
                });

            window.loadProfessors = function() {
                fetch('/api/professors')
                    .then(res => res.json())
                    .then(data => renderTable(data))
                    .catch(err => console.error(err));
            };

            function renderTable(profs) {
                let tbody = document.getElementById('all-professors-tbody');
                tbody.innerHTML = '';
                if(profs.length === 0) {
                    let colspan = isAdmin ? 5 : 4;
                    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted py-4">Няма данни</td></tr>`;
                    return;
                }

                profs.forEach(p => {
                    let actionColumnHtml = '';
                    if (isAdmin) {
                        let profJson = encodeURIComponent(JSON.stringify(p));
                        actionColumnHtml = `
                        <td class="text-end px-4">
                            <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${profJson}')"><i class="bi bi-pencil-fill"></i></button>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteProf(${p.id})"><i class="bi bi-trash-fill"></i></button>
                        </td>`;
                    }

                    tbody.innerHTML += `
                    <tr class="new-row">
                        <td class="px-4 py-3 text-secondary">#${p.id}</td>
                        <td class="fw-bold">${p.firstName}</td>
                        <td class="fw-bold">${p.lastName}</td>
                        <td><span class="badge bg-warning text-dark">${p.title || '-'}</span></td>
                        ${actionColumnHtml}
                    </tr>`;
                });
            }

            window.openCreateModal = function() {
                document.getElementById('profForm').reset();
                document.getElementById('profId').value = '';
                new bootstrap.Modal(document.getElementById('profModal')).show();
            };

            window.openEditModal = function(encodedProf) {
                let p = JSON.parse(decodeURIComponent(encodedProf));
                document.getElementById('profId').value = p.id;
                document.getElementById('profFirstName').value = p.firstName;
                document.getElementById('profLastName').value = p.lastName;
                document.getElementById('profTitle').value = p.title;
                new bootstrap.Modal(document.getElementById('profModal')).show();
            };

            document.getElementById('save-prof-btn').addEventListener('click', function() {
                let id = document.getElementById('profId').value;
                let data = {
                    firstName: document.getElementById('profFirstName').value,
                    lastName: document.getElementById('profLastName').value,
                    title: document.getElementById('profTitle').value
                };
                let url = id ? '/api/professors/' + id : '/api/professors';
                let method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                }).then(() => {
                    bootstrap.Modal.getInstance(document.getElementById('profModal')).show();
                    bootstrap.Modal.getInstance(document.getElementById('profModal')).hide();
                    loadProfessors();
                });
            });

            window.deleteProf = function(id) {
                if(confirm('Изтриване на преподавател?')) {
                    fetch('/api/professors/' + id, { method: 'DELETE' }).then(() => loadProfessors());
                }
            };
        });
    </script>
</body>
</html>
