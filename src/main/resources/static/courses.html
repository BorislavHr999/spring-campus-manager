<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специалности - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> Преподаватели</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-journal-code me-2"></i> Всички Специалности / Курсове</h1>
                    <button class="btn btn-outline-info btn-sm rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#courseModal">
                        <i class="bi bi-plus-circle-fill me-1"></i> Нов Курс
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Име на курса</th>
                                <th class="py-3">Кредити</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-courses-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-journal-plus me-2"></i> Създаване на нов курс</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Име на курса</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Кредити (ECTS)</label>
                            <input type="number" class="form-control" id="courseCredits" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-info text-dark fw-bold" id="save-course-btn">Запиши курса</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="assignProfessorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fs-6"><i class="bi bi-person-workspace me-2"></i> Избери преподавател</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="assignCourseId">
                    <select class="form-select" id="professorSelect">
                        </select>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-success btn-sm w-100" onclick="confirmAssignProfessor()">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // Глобална променлива за преподавателите
            window.availableProfessors = [];

            // 1. Изтегляме всички преподаватели още при зареждане на страницата
            fetch('/api/professors')
                .then(res => res.json())
                .then(data => window.availableProfessors = data)
                .catch(err => console.error("Грешка при зареждане на преподаватели:", err));

            // 2. Функция за зареждане на всички курсове
            window.loadAllCourses = function() {
                fetch('/api/courses')
                    .then(response => response.json())
                    .then(courses => {
                        let tableBody = document.getElementById('all-courses-tbody');
                        tableBody.innerHTML = ''; 
                        if (courses.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Няма намерени курсове.</td></tr>';
                            return;
                        }
                        
                        courses.forEach(course => {
                            // Логика за колоната "Преподавател"
                            let profHtml = '';
                            if (course.professor) {
                                // Ако има преподавател -> Показваме името му и бутон "Х" за премахване
                                let title = course.professor.title ? course.professor.title : '';
                                profHtml = `<span class="badge bg-warning text-dark px-2 py-1 shadow-sm fs-6">
                                                <i class="bi bi-person-fill"></i> ${title} ${course.professor.firstName} ${course.professor.lastName} 
                                                <i class="bi bi-x-circle ms-2" style="cursor:pointer;" onclick="removeProfessor(${course.id})" title="Премахни"></i>
                                            </span>`;
                            } else {
                                // Ако няма -> Показваме бутон "+ Преподавател"
                                profHtml = `<button class="btn btn-sm btn-outline-warning rounded-pill py-0" onclick="openAssignModal(${course.id})">
                                                <i class="bi bi-plus"></i> Преподавател
                                            </button>`;
                            }

                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3 text-secondary">#${course.id}</td>
                                <td class="fw-bold text-light"><i class="bi bi-book me-2 text-info"></i> ${course.name}</td>
                                <td><span class="badge bg-secondary">${course.credits} кр.</span></td>
                                <td>${profHtml}</td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteCourse(${course.id})" title="Изтрий курс">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </td>
                            </tr>
                            `;
                            tableBody.innerHTML += row;
                        });
                    });
            };

            // Първоначално зареждане
            window.loadAllCourses();

            // 3. Отваряне на модала за избор на преподавател
            window.openAssignModal = function(courseId) {
                document.getElementById('assignCourseId').value = courseId;
                let select = document.getElementById('professorSelect');
                select.innerHTML = '<option value="">-- Избери от списъка --</option>';
                
                window.availableProfessors.forEach(p => {
                    let title = p.title ? p.title : '';
                    select.innerHTML += `<option value="${p.id}">${title} ${p.firstName} ${p.lastName}</option>`;
                });
                
                let modal = new bootstrap.Modal(document.getElementById('assignProfessorModal'));
                modal.show();
            };

            // 4. Записване на избрания преподавател (Свързване с контролера)
            window.confirmAssignProfessor = function() {
                let courseId = document.getElementById('assignCourseId').value;
                let profId = document.getElementById('professorSelect').value;
                
                if(!profId) return alert('Моля, избери преподавател!');

                fetch(`/api/courses/${courseId}/professor/${profId}`, { method: 'PUT' })
                    .then(res => {
                        if(!res.ok) throw new Error('Грешка при назначаване');
                        bootstrap.Modal.getInstance(document.getElementById('assignProfessorModal')).hide();
                        window.loadAllCourses(); // Презареждаме таблицата, за да видим промяната
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Възникна грешка при назначаването!');
                    });
            };

            // 5. Премахване на преподавател от курса (Разкачане)
            window.removeProfessor = function(courseId) {
                if(confirm('Сигурен ли си, че искаш да премахнеш преподавателя от този курс?')) {
                    fetch(`/api/courses/${courseId}/professor`, { method: 'DELETE' })
                        .then(res => {
                            if(!res.ok) throw new Error('Грешка при премахване');
                            window.loadAllCourses();
                        })
                        .catch(err => {
                            console.error(err);
                            alert('Възникна грешка при премахването!');
                        });
                }
            };

            // 6. Изтриване на самия курс
            window.deleteCourse = function(id) {
                if(confirm('Изтриването на курс е необратимо. Продължаваме ли?')) {
                    fetch('/api/courses/' + id, { method: 'DELETE' })
                        .then(() => window.loadAllCourses());
                }
            };

            // 7. Създаване на нов курс
            document.getElementById('save-course-btn').addEventListener('click', function() {
                let newCourse = {
                    name: document.getElementById('courseName').value,
                    credits: parseInt(document.getElementById('courseCredits').value) || 0
                };
                
                fetch('/api/courses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newCourse)
                })
                .then(response => {
                     if (!response.ok) throw new Error('Грешка при създаване');
                     bootstrap.Modal.getInstance(document.getElementById('courseModal')).hide();
                     document.getElementById('courseForm').reset();
                     window.loadAllCourses();
                })
                .catch(err => {
                    console.error(err);
                    alert("Грешка при запазването на курса.");
                });
            });
        });
    </script>
</body>
</html>
