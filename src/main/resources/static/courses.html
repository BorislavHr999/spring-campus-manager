<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специалности - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> Преподаватели</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light">Управление на курсове и връзки</h1>
                    <button class="btn btn-outline-info btn-sm rounded-pill px-3 shadow-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-circle-fill me-1"></i> Нов Курс
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Дисциплина</th>
                                <th class="py-3">Кредити</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-courses-tbody"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="courseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Курс</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <input type="hidden" id="courseId"> <div class="mb-3">
                            <label class="form-label text-muted small">Име на курса</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Брой кредити (ECTS)</label>
                            <input type="number" class="form-control" id="courseCredits" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Назначен преподавател</label>
                            <select class="form-select" id="professorSelect">
                                <option value="">-- Без преподавател --</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-info text-white" id="save-course-btn">Запази промените</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const courseModal = new bootstrap.Modal(document.getElementById('courseModal'));

            // 1. Зареждане на всички курсове
            window.loadAllCourses = function() {
                fetch('/api/dashboard/all-courses')
                    .then(r => r.json())
                    .then(courses => {
                        let tableBody = document.getElementById('all-courses-tbody');
                        tableBody.innerHTML = '';
                        courses.forEach(c => {
                            let profName = c.professor ? `${c.professor.firstName} ${c.professor.lastName}` : '<span class="text-muted">Няма</span>';
                            let profId = c.professor ? c.professor.id : "";
                            
                            tableBody.innerHTML += `
                            <tr>
                                <td class="px-4 py-3 text-secondary">#${c.id}</td>
                                <td><i class="bi bi-book me-2 text-info"></i> ${c.name}</td>
                                <td><span class="badge bg-info bg-opacity-25 text-info">${c.credits} ECTS</span></td>
                                <td><i class="bi bi-person-badge me-1 text-muted"></i> ${profName}</td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-light btn-sm rounded-circle me-2" 
                                            onclick="openEditModal(${c.id}, '${c.name}', ${c.credits}, '${profId}')">
                                        <i class="bi bi-pencil-fill"></i>
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteCourse(${c.id})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>`;
                        });
                    });
            };

            // 2. Зареждане на професорите в падащото меню
            window.loadProfessorsToSelect = function() {
                fetch('/api/dashboard/all-professors')
                    .then(r => r.json())
                    .then(profs => {
                        let select = document.getElementById('professorSelect');
                        select.innerHTML = '<option value="">-- Без преподавател --</option>';
                        profs.forEach(p => {
                            select.innerHTML += `<option value="${p.id}">${p.firstName} ${p.lastName}</option>`;
                        });
                    });
            };

            // 3. Отваряне за Създаване
            window.openCreateModal = function() {
                document.getElementById('modalTitle').innerText = "Добавяне на нов курс";
                document.getElementById('courseId').value = "";
                document.getElementById('courseForm').reset();
                loadProfessorsToSelect();
                courseModal.show();
            };

            // 4. Отваряне за Редактиране
            window.openEditModal = function(id, name, credits, profId) {
                document.getElementById('modalTitle').innerText = "Редактиране на курс";
                document.getElementById('courseId').value = id;
                document.getElementById('courseName').value = name;
                document.getElementById('courseCredits').value = credits;
                
                // Зареждаме професорите и след това селектираме правилния
                fetch('/api/dashboard/all-professors')
                    .then(r => r.json())
                    .then(profs => {
                        let select = document.getElementById('professorSelect');
                        select.innerHTML = '<option value="">-- Без преподавател --</option>';
                        profs.forEach(p => {
                            select.innerHTML += `<option value="${p.id}">${p.firstName} ${p.lastName}</option>`;
                        });
                        select.value = profId;
                        courseModal.show();
                    });
            };

            // 5. Запис (POST или PUT)
            document.getElementById('save-course-btn').addEventListener('click', function() {
                let id = document.getElementById('courseId').value;
                let data = {
                    name: document.getElementById('courseName').value,
                    credits: document.getElementById('courseCredits').value,
                    professorId: document.getElementById('professorSelect').value
                };

                let url = id ? `/api/dashboard/update-course/${id}` : '/api/dashboard/add-real-course';
                let method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                }).then(() => {
                    courseModal.hide();
                    loadAllCourses();
                });
            });

            // Първоначално зареждане
            loadAllCourses();
        });

        window.deleteCourse = function(id) {
            if(confirm('Изтриване на курса?')) {
                fetch('/api/dashboard/delete-course/' + id, { method: 'DELETE' }).then(() => loadAllCourses());
            }
        };
    </script>
</body>
</html>
