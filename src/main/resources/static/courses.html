<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специалности - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-shield-lock me-3"></i> Сигурност</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-journal-code me-2"></i> Специалности и Курсове</h1>
                    <button id="add-course-btn" class="btn btn-outline-info btn-sm rounded-pill px-3 shadow-sm">
                        <i class="bi bi-plus-circle-fill me-1"></i> Добави нов курс
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Име на дисциплина</th>
                                <th class="py-3">Кредити (ECTS)</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-courses-tbody">
                            <tr>
                                <td colspan="5" class="text-center py-4">
                                    <span class="spinner-border spinner-border-sm text-secondary me-2"></span> Зареждане на данни...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Функция за зареждане на курсовете
            window.loadAllCourses = function() {
                fetch('/api/dashboard/all-courses')
                    .then(response => response.json())
                    .then(courses => {
                        let tableBody = document.getElementById('all-courses-tbody');
                        tableBody.innerHTML = ''; 
                        
                        // Ако няма курсове в базата
                        if (courses.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Няма въведени специалности в системата.</td></tr>';
                            return;
                        }

                        // Обхождаме курсовете и ги добавяме в таблицата
                        courses.forEach(course => {
                            // Проверяваме дали има преподавател (тъй като в началото са null)
                            let professorName = course.professor ? course.professor.firstName + ' ' + course.professor.lastName : '<span class="text-muted fst-italic">Не е назначен</span>';
                            
                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3 text-secondary">#${course.id}</td>
                                <td><i class="bi bi-book-half me-2 text-info"></i> ${course.name}</td>
                                <td><span class="badge bg-primary bg-opacity-50 px-2 py-1">${course.credits} ECTS</span></td>
                                <td>${professorName}</td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteCourse(${course.id})" title="Изтрий курс">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </td>
                            </tr>
                            `;
                            tableBody.innerHTML += row;
                        });
                    })
                    .catch(error => console.error('Грешка:', error));
            };

            // Зареждаме ги при старт
            window.loadAllCourses();

            // Триене на курс
            window.deleteCourse = function(id) {
                if(confirm('Сигурен ли си, че искаш да изтриеш този курс?')) {
                    fetch('/api/dashboard/delete-course/' + id, { method: 'DELETE' })
                        .then(response => response.json())
                        .then(data => {
                            window.loadAllCourses(); // Презареждаме таблицата
                        });
                }
            };

            // Добавяне на тестов курс
            document.getElementById('add-course-btn').addEventListener('click', function() {
                let btn = this;
                let originalText = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Създаване...';
                btn.disabled = true;

                fetch('/api/dashboard/add-demo-course', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        window.loadAllCourses(); // Презареждаме таблицата
                    })
                    .finally(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            });
        });
    </script>
</body>
</html>
