<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специалности - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #0dcaf0, #0d6efd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0dcaf0; box-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                    </a>
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span data-i18n="nav_dashboard">Главно табло</span></a>
                        <a href="profile.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-badge me-3"></i> <span>Моят профил</span></a>
                        <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span data-i18n="nav_students">Студенти</span></a>
                        
                        <a href="departments.html" id="nav-departments" class="list-group-item list-group-item-action bg-transparent text-light border-0 d-none"><i class="bi bi-building me-3"></i> <span>Факултети</span></a>
                        
                        <a href="courses.html" class="list-group-item list-group-item-action bg-info text-dark rounded border-0 fw-bold"><i class="bi bi-journal-code me-3"></i> <span data-i18n="nav_courses">Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span data-i18n="nav_prof">Преподаватели</span></a>
                        <a href="clubs.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-controller me-3"></i> <span>Студентски Клубове</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-journal-code me-2 text-info"></i> <span data-i18n="nav_courses">Специалности</span></h1>
                    <button id="btn-new-course" class="btn btn-outline-info btn-sm rounded-pill px-3 shadow-sm d-none" onclick="openCreateModal()">
                        <i class="bi bi-plus-circle-fill me-1"></i> <span data-i18n="btn_new_course">Нова Специалност</span>
                    </button>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4" data-i18n="th_id">ID</th>
                                <th class="py-3" data-i18n="th_name">Име на специалността</th>
                                <th class="py-3" data-i18n="th_credits">Кредити</th>
                                <th class="py-3">Преподавател</th>
                                <th class="py-3 text-end px-4 admin-actions d-none" id="th-action" data-i18n="th_action">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-courses-tbody">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-journal-plus me-2 text-info"></i> Специалност</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <input type="hidden" id="courseId">
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Име на специалността</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Кредити</label>
                            <input type="number" class="form-control" id="courseCredits" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Преподавател</label>
                            <select class="form-select" id="courseProfessor">
                                <option value="">-- Изберете преподавател --</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-info text-dark fw-bold px-4" id="save-course-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let isAdmin = false;

            // 0. Зареждане на преподавателите
            fetch('/api/professors')
                .then(res => res.json())
                .then(data => {
                    let professors = data.content ? data.content : data;
                    let select = document.getElementById('courseProfessor');
                    select.innerHTML = '<option value="">-- Изберете преподавател --</option>';
                    professors.forEach(prof => {
                        select.innerHTML += `<option value="${prof.id}">${prof.firstName} ${prof.lastName}</option>`;
                    });
                })
                .catch(err => console.error("Грешка при зареждане на преподаватели:", err));
            
            // 1. Проверка на правата (Админ)
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                    
                    if (isAdmin) {
                        // Показваме бутона за нова специалност и менюто Факултети
                        let newBtn = document.getElementById('btn-new-course');
                        if(newBtn) newBtn.classList.remove('d-none');
                        
                        let navDept = document.getElementById('nav-departments');
                        if(navDept) navDept.classList.remove('d-none');
                        
                        let actionTh = document.getElementById('th-action');
                        if(actionTh) actionTh.classList.remove('d-none');
                    }
                    
                    window.loadCourses();
                })
                .catch(err => {
                    console.error("Грешка при проверка на права:", err);
                    window.loadCourses();
                });

            // 2. Зареждане на курсовете
            window.loadCourses = function() {
                fetch('/api/courses')
                    .then(res => res.json())
                    .then(data => {
                        let courses = data.content ? data.content : data;
                        renderTable(courses);
                    })
                    .catch(err => console.error(err));
            };

            // 3. Рисуване на таблицата
            function renderTable(courses) {
                let tbody = document.getElementById('all-courses-tbody');
                tbody.innerHTML = '';
                
                if(courses.length === 0) {
                    let colspan = isAdmin ? 5 : 4;
                    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted py-4">Няма данни</td></tr>`;
                    return;
                }

                courses.forEach(c => {
                    let actionButtonsHtml = '';
                    
                    if (isAdmin) {
                        const courseJson = encodeURIComponent(JSON.stringify(c));
                        actionButtonsHtml = `
                            <td class="text-end px-4">
                                <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${courseJson}')" title="Редактирай">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteCourse(${c.id})" title="Изтрий">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>`;
                    } else {
                        // За обикновен потребител/студент бутон "Запиши се"
                        actionButtonsHtml = `
                            <td class="text-end px-4">
                                <button class="btn btn-sm btn-success rounded-pill px-3 shadow-sm" onclick="enrollInCourse(${c.id})">
                                    <i class="bi bi-check-circle me-1"></i> Запиши се
                                </button>
                            </td>`;
                    }

                    let profName = c.professor 
                        ? `<i class="bi bi-person-workspace text-light me-1"></i> ${c.professor.firstName} ${c.professor.lastName}`
                        : `<span class="text-muted small fst-italic">Няма назначен</span>`;

                    const tr = document.createElement('tr');
                    tr.className = 'new-row';
                    tr.innerHTML = `
                        <td class="px-4 py-3 text-secondary">#${c.id}</td>
                        <td class="fw-bold text-info">${c.name}</td>
                        <td><span class="badge bg-secondary">${c.credits}</span></td>
                        <td>${profName}</td>
                        ${actionButtonsHtml}
                    `;
                    tbody.appendChild(tr);
                });
            }

            // 4. Отваряне на модалите
            window.openCreateModal = function() {
                document.getElementById('courseForm').reset();
                document.getElementById('courseId').value = '';
                document.getElementById('courseProfessor').value = ''; 
                new bootstrap.Modal(document.getElementById('courseModal')).show();
            };

            window.openEditModal = function(encodedCourse) {
                let c = JSON.parse(decodeURIComponent(encodedCourse));
                document.getElementById('courseId').value = c.id;
                document.getElementById('courseName').value = c.name;
                document.getElementById('courseCredits').value = c.credits;
                
                if (c.professor && c.professor.id) {
                    document.getElementById('courseProfessor').value = c.professor.id;
                } else {
                    document.getElementById('courseProfessor').value = '';
                }
                
                new bootstrap.Modal(document.getElementById('courseModal')).show();
            };

            // 5. Запазване в базата
            document.getElementById('save-course-btn').addEventListener('click', function() {
                let id = document.getElementById('courseId').value;
                let courseName = document.getElementById('courseName').value;
                let courseCredits = document.getElementById('courseCredits').value;
                let profSelect = document.getElementById('courseProfessor');
                let profId = profSelect.options[profSelect.selectedIndex].value;

                let data = {
                    name: courseName,
                    credits: courseCredits
                };

                if (profId && profId !== "") {
                    data.professor = { id: parseInt(profId) };
                } else {
                    data.professor = null; 
                }

                let url = id ? '/api/courses/' + id : '/api/courses';
                let method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.message || "Грешка от сървъра") });
                    }
                    return response.json();
                })
                .then(() => {
                    let modalEl = document.getElementById('courseModal');
                    let modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                    
                    window.loadCourses();
                })
                .catch(err => {
                    console.error("Грешка при запазване:", err);
                    alert("Възникна грешка: " + err.message);
                });
            });

            // 6. Изтриване
            window.deleteCourse = function(id) {
                if(confirm('Изтриване на специалност?')) {
                    fetch('/api/courses/' + id, { method: 'DELETE' }).then(() => loadCourses());
                }
            };
        });

        // 7. Записване в курс
        window.enrollInCourse = async function(courseId) {
            try {
                let response = await fetch(`/api/enrollments/enroll/${courseId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                let result = await response.json();
                
                if (response.ok) {
                    alert("✅ " + result.message);
                } else {
                    alert("⚠️ " + (result.message || "Грешка при записване"));
                }
            } catch (error) {
                console.error("Грешка:", error);
                alert("❌ Възникна грешка при записването. Проверете конзолата.");
            }
        };
    </script>
</body>
</html>
