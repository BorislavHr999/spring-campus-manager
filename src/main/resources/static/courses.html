<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специалности - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span data-i18n="nav_dashboard">Главно табло</span></a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span data-i18n="nav_students">Студенти</span></a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-journal-code me-3"></i> <span data-i18n="nav_courses">Специалности</span></a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span data-i18n="nav_prof">Преподаватели</span></a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-journal-code me-2"></i> <span data-i18n="nav_courses">Всички Специалности / Курсове</span></h1>
                    <button class="btn btn-outline-info btn-sm rounded-pill px-3 shadow-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-circle-fill me-1"></i> <span data-i18n="btn_new_course">Нов Курс</span>
                    </button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-5">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-secondary" placeholder="Търси курс по име..." data-i18n="search_course">
                        </div>
                    </div>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4" data-i18n="th_id">ID</th>
                                <th class="py-3" data-i18n="th_course_name">Име на курса</th>
                                <th class="py-3" data-i18n="th_credits">Кредити</th>
                                <th class="py-3" data-i18n="th_professor">Преподавател</th>
                                <th class="py-3 text-end px-4" data-i18n="th_action">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-courses-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-journal-plus me-2 text-info"></i> <span data-i18n="nav_courses">Специалности</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="errorAlert" class="alert alert-danger d-none small py-2 mb-3" role="alert"></div>
                    
                    <form id="courseForm">
                        <input type="hidden" id="courseId">
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1" data-i18n="th_course_name">Име на курса</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1" data-i18n="th_credits">Кредити</label>
                            <input type="number" class="form-control" id="courseCredits" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-info text-dark fw-bold px-4" id="save-course-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="assignProfessorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fs-6"><i class="bi bi-person-workspace me-2 text-warning"></i> <span data-i18n="th_professor">Преподавател</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="assignCourseId">
                    <select class="form-select" id="professorSelect"></select>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-success btn-sm w-100" onclick="confirmAssignProfessor()">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script> <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            window.allCoursesData = []; 
            window.availableProfessors = [];

            // Изтегляме преподавателите за dropdown менюто
            fetch('/api/professors').then(res => res.json()).then(data => window.availableProfessors = data);

            // 1. Зареждане на всички курсове
            window.loadAllCourses = function() {
                fetch('/api/courses')
                    .then(res => res.json())
                    .then(courses => {
                        window.allCoursesData = courses;
                        renderTable(courses);
                    });
            };

            // 2. Рисуване на таблицата
            function renderTable(coursesToRender) {
                let tableBody = document.getElementById('all-courses-tbody');
                tableBody.innerHTML = ''; 
                
                if (coursesToRender.length === 0) {
                    // Използваме t('no_data') за превод на празната таблица
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">${t('no_data')}</td></tr>`;
                    return;
                }
                
                coursesToRender.forEach(course => {
                    let profHtml = '';
                    if (course.professor) {
                        let title = course.professor.title ? course.professor.title : '';
                        profHtml = `<span class="badge bg-warning text-dark px-2 py-1 shadow-sm fs-6">
                                        <i class="bi bi-person-fill"></i> ${title} ${course.professor.firstName} ${course.professor.lastName} 
                                        <i class="bi bi-x-circle ms-2" style="cursor:pointer;" onclick="removeProfessor(${course.id})" title="Премахни"></i>
                                    </span>`;
                    } else {
                        // Използваме t('btn_assign_prof') за бутона
                        profHtml = `<button class="btn btn-sm btn-outline-warning rounded-pill py-0" onclick="openAssignModal(${course.id})">
                                        <i class="bi bi-plus"></i> ${t('btn_assign_prof')}
                                    </button>`;
                    }

                    let courseJson = encodeURIComponent(JSON.stringify(course));

                    let row = `
                    <tr class="new-row">
                        <td class="px-4 py-3 text-secondary">#${course.id}</td>
                        <td class="fw-bold text-light"><i class="bi bi-book me-2 text-info"></i> ${course.name}</td>
                        <td><span class="badge bg-secondary">${course.credits}</span></td>
                        <td>${profHtml}</td>
                        <td class="text-end px-4">
                            <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${courseJson}')" title="Редактирай">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteCourse(${course.id})" title="Изтрий">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }

            window.loadAllCourses();

            // Live Search
            document.getElementById('searchInput').addEventListener('input', function(e) {
                let searchTerm = e.target.value.toLowerCase();
                let filteredCourses = window.allCoursesData.filter(c => c.name.toLowerCase().includes(searchTerm));
                renderTable(filteredCourses);
            });

            window.openCreateModal = function() {
                document.getElementById('courseForm').reset();
                document.getElementById('courseId').value = ''; 
                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('courseModal')).show();
            };

            window.openEditModal = function(encodedCourse) {
                let course = JSON.parse(decodeURIComponent(encodedCourse));
                document.getElementById('courseId').value = course.id;
                document.getElementById('courseName').value = course.name;
                document.getElementById('courseCredits').value = course.credits;
                
                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('courseModal')).show();
            };

            document.getElementById('save-course-btn').addEventListener('click', async function() {
                let id = document.getElementById('courseId').value;
                let courseData = {
                    name: document.getElementById('courseName').value,
                    credits: parseInt(document.getElementById('courseCredits').value) || 0
                };

                let url = id ? `/api/courses/${id}` : '/api/courses'; 
                let method = id ? 'PUT' : 'POST';

                try {
                    let response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(courseData)
                    });

                    if (!response.ok) {
                        let errorMsg = await response.text(); 
                        throw new Error(errorMsg);
                    }

                    bootstrap.Modal.getInstance(document.getElementById('courseModal')).hide();
                    window.loadAllCourses();
                    document.getElementById('searchInput').value = ''; 
                } catch (error) {
                    let errorDiv = document.getElementById('errorAlert');
                    errorDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${error.message}`;
                    errorDiv.classList.remove('d-none');
                }
            });

            window.deleteCourse = function(id) {
                if(confirm('Сигурен ли си?')) {
                    fetch('/api/courses/' + id, { method: 'DELETE' }).then(() => window.loadAllCourses());
                }
            };

            // Методи за преподаватели
            window.openAssignModal = function(courseId) {
                document.getElementById('assignCourseId').value = courseId;
                let select = document.getElementById('professorSelect');
                select.innerHTML = '<option value="">-- --</option>';
                window.availableProfessors.forEach(p => {
                    let title = p.title ? p.title : '';
                    select.innerHTML += `<option value="${p.id}">${title} ${p.firstName} ${p.lastName}</option>`;
                });
                new bootstrap.Modal(document.getElementById('assignProfessorModal')).show();
            };

            window.confirmAssignProfessor = function() {
                let courseId = document.getElementById('assignCourseId').value;
                let profId = document.getElementById('professorSelect').value;
                if(!profId) return;

                fetch(`/api/courses/${courseId}/professor/${profId}`, { method: 'PUT' })
                    .then(() => {
                        bootstrap.Modal.getInstance(document.getElementById('assignProfessorModal')).hide();
                        window.loadAllCourses();
                    });
            };

            window.removeProfessor = function(courseId) {
                if(confirm('Премахване на преподавателя?')) {
                    fetch(`/api/courses/${courseId}/professor`, { method: 'DELETE' })
                        .then(() => window.loadAllCourses());
                }
            };
        });
    </script>
</body>
</html>
