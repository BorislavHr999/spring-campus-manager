<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студенти - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.5s ease-out; }
        /* Стил за тъмния модал */
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                <div class="list-group list-group-flush gap-2 px-2">
                    <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> Главно табло</a>
                    <a href="students.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-people me-3"></i> Студенти</a>
                    <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> Специалности</a>
                    <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> Преподаватели</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-people me-2"></i> Всички студенти</h1>
                    
                    <button class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#studentModal">
                        <i class="bi bi-person-plus-fill me-1"></i> Нов Студент
                    </button>
                </div>

                <div class="table-custom p-1 shadow">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Студент</th>
                                <th class="py-3">Фак. Номер</th>
                                <th class="py-3">Имейл</th>
                                <th class="py-3 text-end px-4">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-students-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-person-lines-fill me-2"></i> Регистрация на студент</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Име</label>
                                <input type="text" class="form-control" id="firstName" required placeholder="Напр. Иван">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Фамилия</label>
                                <input type="text" class="form-control" id="lastName" required placeholder="Напр. Иванов">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Имейл адрес</label>
                            <input type="email" class="form-control" id="email" required placeholder="ivan.ivanov@campus.bg">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Факултетен Номер</label>
                                <input type="text" class="form-control" id="facultyNumber" required placeholder="Напр. FAC1234">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small">Възраст</label>
                                <input type="number" class="form-control" id="age" required placeholder="Напр. 21">
                                <div class="mb-3">
                            <label class="form-label text-muted small">Записани курсове (Мулти-избор)</label>
                            <select multiple class="form-control" id="courses" style="height: 100px;">
                                </select>
                            <div class="form-text text-secondary small">Задръжте Ctrl/Cmd за избор на няколко курса.</div>
                        </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-primary" id="save-student-btn">Запиши в базата</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Зареждане на студентите
            window.loadAllStudents = function() {
                fetch('/api/dashboard/all-students')
                    .then(response => response.json())
                    .then(students => {
                        let tableBody = document.getElementById('all-students-tbody');
                        tableBody.innerHTML = ''; 
                        if (students.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Няма намерени студенти.</td></tr>';
                            return;
                        }
                        students.forEach(student => {
                            let row = `
                            <tr class="new-row">
                                <td class="px-4 py-3 text-secondary">#${student.id}</td>
                                <td><i class="bi bi-person-circle me-2 text-primary"></i> ${student.firstName} ${student.lastName}</td>
                                <td><span class="text-info">${student.facultyNumber}</span></td>
                                <td class="text-muted">${student.email}</td>
                                <td class="text-end px-4">
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteStudent(${student.id})" title="Изтрий">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </td>
                            </tr>
                            `;
                            tableBody.innerHTML += row;
                        });
                    });
            };

            window.loadCoursesForDropdown = function() {
                
                fetch('/api/courses') 
                    .then(response => response.json())
                    .then(courses => {
                        let selectElement = document.getElementById('courses');
                        selectElement.innerHTML = ''; 
                        courses.forEach(course => {
                            let option = document.createElement('option');
                            option.value = course.id;
                            option.text = `${course.name} (${course.credits} кр.)`;
                            selectElement.appendChild(option);
                        });
                    })
                    .catch(error => console.error('Грешка при зареждане на курсове:', error));
            };

            window.loadCoursesForDropdown();

            window.loadAllStudents();

            // 2. Триене
            window.deleteStudent = function(id) {
                if(confirm('Сигурен ли си, че искаш да изтриеш този студент завинаги?')) {
                    fetch('/api/dashboard/delete-student/' + id, { method: 'DELETE' })
                        .then(() => window.loadAllStudents());
                }
            };

            // 3. НОВОТО: Запазване на реален студент от формата
            
                // Обновено: Триене
            window.deleteStudent = function(id) {
                if(confirm('Сигурен ли си, че искаш да изтриеш този студент завинаги?')) {
                    fetch('/api/dashboard/delete-student/' + id, { method: 'DELETE' })
                        .then(() => window.loadAllStudents());
                }
            };

            // Обновено: Запазване на реален студент от формата (вкл. курсове)
            document.getElementById('save-student-btn').addEventListener('click', function() {
                
                // Взимаме избраните ID-та на курсове от падащото меню
                let selectedCoursesIds = Array.from(document.getElementById('courses').selectedOptions)
                                             .map(option => ({ id: option.value }));

                // Събираме данните от полетата в JavaScript обект
                let newStudent = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    facultyNumber: document.getElementById('facultyNumber').value,
                    age: document.getElementById('age').value,
                    courses: selectedCoursesIds // НОВО: Добавяме масива с курсове
                };

                // Изпращаме ги като JSON към новия бекенд метод
                fetch('/api/dashboard/add-real-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newStudent)
                })
                .then(response => {
                     if (!response.ok) throw new Error('Грешка при запис на сървъра');
                     return response.json();
                })
                .then(data => {
                    // Скриваме модала
                    let modalElement = document.getElementById('studentModal');
                    let modalInstance = bootstrap.Modal.getInstance(modalElement);
                    modalInstance.hide();
                    
                    // Изчистваме формата за следващия път
                    document.getElementById('studentForm').reset();
                    
                    // Презареждаме таблицата, за да видим новия запис
                    window.loadAllStudents();
                })
                .catch(error => {
                    console.error('Грешка при запис:', error);
                    alert("Възникна грешка при запазването. Проверете конзолата.");
                });
            });
        });
    </script>
</body>
</html>
