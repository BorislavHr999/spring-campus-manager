<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студенти - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                    </a>
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span>Главно табло</span></a>
                        <a href="students.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-people me-3"></i> <span>Студенти</span></a>
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span>Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span>Преподаватели</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-people me-2"></i> <span>Всички студенти</span></h1>
                    <button id="btn-new-student" class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm" onclick="openCreateModal()">
                        <i class="bi bi-person-plus-fill me-1"></i> Нов Студент
                    </button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-5">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-secondary" placeholder="Търси...">
                        </div>
                    </div>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Студент</th>
                                <th class="py-3">Катедра & Адрес</th>
                                <th class="py-3">Фак. Номер</th>
                                <th class="py-3 text-center">Записани курсове</th>
                                <th class="py-3 text-end px-4" id="th-action">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-students-tbody"></tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <span id="page-info" class="text-muted small fw-bold">Страница 1 от 1</span>
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-outline-secondary btn-sm" id="prev-btn" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i></button>
                        <button class="btn btn-outline-secondary btn-sm" id="next-btn" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-person-badge me-2"></i> <span>Студент</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="errorAlert" class="alert alert-danger d-none small py-2 mb-3" role="alert"></div>
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Име</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Фамилия</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Факултетен номер</label>
                                <input type="text" class="form-control" id="facultyNumber" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Имейл</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-info small mb-1"><i class="bi bi-building"></i> Катедра *</label>
                                <select class="form-select border-info" id="departmentId" required>
                                    <option value="">-- Избери Катедра --</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-info small mb-1"><i class="bi bi-geo-alt"></i> Адрес *</label>
                                <select class="form-select border-info" id="addressId" required>
                                    <option value="">-- Избери Адрес --</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-success text-white fw-bold px-4" id="save-student-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="coursesModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header bg-light border-bottom">
                    <h5 class="modal-title">Курсове и оценки: <span id="modalStudentName" class="fw-bold text-primary"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul id="modalCoursesList" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let isAdmin = false;
            let currentPage = 0;
            const pageSize = 10;
            let currentKeyword = '';
            
            // Променливи за данните от падащите менюта
            let allAvailableDepartments = [];
            let allAvailableAddresses = [];

            // ИНИЦИАЛИЗАЦИЯ: Взимаме всичко наведнъж
            Promise.all([
                fetch('/api/auth/me').then(res => res.json()),
                fetch('/api/departments').then(res => res.json()),
                fetch('/api/addresses').then(res => res.json())
            ])
            .then(([user, depts, addrs]) => {
                isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                if (!isAdmin) {
                    document.getElementById('btn-new-student').style.display = 'none';
                    document.getElementById('th-action').style.display = 'none';
                }

                // Записваме списъците
                allAvailableDepartments = depts.content || depts;
                allAvailableAddresses = addrs.content || addrs;

                // Пълним падащите менюта в модала
                let deptSelect = document.getElementById('departmentId');
                allAvailableDepartments.forEach(d => {
                    deptSelect.innerHTML += `<option value="${d.id}">${d.name} (Офис: ${d.office})</option>`;
                });

                let addrSelect = document.getElementById('addressId');
                allAvailableAddresses.forEach(a => {
                    addrSelect.innerHTML += `<option value="${a.id}">${a.city}, ${a.street} (${a.country})</option>`;
                });

                loadAllStudents(0);
            })
            .catch(err => console.error("Грешка при зареждане на ресурси:", err));

            window.loadAllStudents = function(page = 0) {
                let url = `/api/students?page=${page}&size=${pageSize}`;
                if (currentKeyword) url += `&keyword=${encodeURIComponent(currentKeyword)}`;
                fetch(url).then(res => res.json()).then(data => {
                    currentPage = data.number;
                    renderTable(data.content);
                    document.getElementById('page-info').innerText = `Страница ${data.number + 1} от ${data.totalPages}`;
                });
            };

            function renderTable(students) {
                let tbody = document.getElementById('all-students-tbody');
                tbody.innerHTML = '';
                students.forEach(s => {
                    let studentJson = encodeURIComponent(JSON.stringify(s));
                    
                    // Показване на Катедра и Адрес в таблицата (с проверка дали ги има)
                    let deptName = s.department ? s.department.name : '<span class="text-danger small">Няма</span>';
                    let addrCity = s.address ? s.address.city : '<span class="text-danger small">Няма</span>';
                    
                    let row = `
                    <tr>
                        <td class="px-4 py-3 text-secondary">#${s.id}</td>
                        <td class="fw-bold"><i class="bi bi-person-circle me-2 text-primary"></i> ${s.firstName} ${s.lastName}<br><small class="text-muted fw-normal">${s.email}</small></td>
                        <td>
                            <div class="small"><i class="bi bi-building text-info me-1"></i> ${deptName}</div>
                            <div class="small"><i class="bi bi-geo-alt text-warning me-1"></i> ${addrCity}</div>
                        </td>
                        <td><span class="text-info">${s.facultyNumber}</span></td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark rounded-pill px-3 view-courses-btn" style="cursor: pointer;" data-student-id="${s.id}" data-name="${s.firstName} ${s.lastName}">${s.courseCount || 0} курса</span>
                        </td>
                        ${isAdmin ? `
                        <td class="text-end px-4">
                            <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${studentJson}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteStudent(${s.id})"><i class="bi bi-trash"></i></button>
                        </td>` : ''}
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }

            // ОТВАРЯНЕ НА МОДАЛ ЗА СЪЗДАВАНЕ
            window.openCreateModal = function() {
                document.getElementById('studentForm').reset();
                document.getElementById('studentId').value = '';
                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('studentModal')).show();
            };

            // ОТВАРЯНЕ НА МОДАЛ ЗА РЕДАКТИРАНЕ
            window.openEditModal = function(encodedStudent) {
                let student = JSON.parse(decodeURIComponent(encodedStudent));
                document.getElementById('studentId').value = student.id;
                document.getElementById('firstName').value = student.firstName;
                document.getElementById('lastName').value = student.lastName;
                document.getElementById('facultyNumber').value = student.facultyNumber;
                document.getElementById('email').value = student.email;
                
                // Избираме правилната катедра и адрес от списъка
                document.getElementById('departmentId').value = student.department ? student.department.id : '';
                document.getElementById('addressId').value = student.address ? student.address.id : '';

                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('studentModal')).show();
            };

            // ЗАПАЗВАНЕ (POST или PUT)
            document.getElementById('save-student-btn').addEventListener('click', async function() {
                let id = document.getElementById('studentId').value;
                let deptId = document.getElementById('departmentId').value;
                let addrId = document.getElementById('addressId').value;

                if(!deptId || !addrId) {
                    let err = document.getElementById('errorAlert');
                    err.innerText = "Моля, изберете Катедра и Адрес!";
                    err.classList.remove('d-none');
                    return;
                }

                // Сглобяваме JSON-а точно както го очаква Java
                let studentData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    facultyNumber: document.getElementById('facultyNumber').value,
                    email: document.getElementById('email').value,
                    department: { id: parseInt(deptId) },
                    address: { id: parseInt(addrId) }
                };

                let url = id ? `/api/students/${id}` : '/api/students';
                let method = id ? 'PUT' : 'POST';

                try {
                    let response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(studentData)
                    });

                    if (!response.ok) {
                        let errorMsg = await response.text();
                        throw new Error(errorMsg || "Сървърна грешка.");
                    }

                    bootstrap.Modal.getInstance(document.getElementById('studentModal')).hide();
                    loadAllStudents(currentPage);
                } catch (error) {
                    let errorDiv = document.getElementById('errorAlert');
                    errorDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${error.message}`;
                    errorDiv.classList.remove('d-none');
                }
            });

            // Търсачка
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentKeyword = e.target.value;
                loadAllStudents(0);
            });

            // Изтриване
            window.deleteStudent = function(id) {
                if(confirm('Сигурни ли сте, че искате да изтриете този студент?')) {
                    fetch('/api/students/' + id, { method: 'DELETE' }).then(() => loadAllStudents(currentPage));
                }
            };
            
            // Смяна на страницата
            window.changePage = function(offset) {
                loadAllStudents(currentPage + offset);
            };

            // Управление на оценки (запазваме твоята логика)
            document.getElementById('all-students-tbody').addEventListener('click', function(e) {
                if (e.target.classList.contains('view-courses-btn')) {
                    const studentId = e.target.getAttribute('data-student-id');
                    const fullName = e.target.getAttribute('data-name');
                    document.getElementById('modalStudentName').textContent = fullName;
                    const list = document.getElementById('modalCoursesList');
                    list.innerHTML = '<li class="list-group-item text-center"><div class="spinner-border spinner-border-sm text-primary"></div></li>';
                    
                    fetch(`/api/students/${studentId}/courses`) // Адаптирай ендпойнта ако се налага
                        .then(res => res.json())
                        .then(enrollments => {
                            list.innerHTML = '';
                            if (enrollments.length === 0) list.innerHTML = '<li class="list-group-item text-muted">Няма записани курсове.</li>';
                            enrollments.forEach(en => {
                                list.innerHTML += `
                                <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                    <div><div class="fw-bold">${en.course.name}</div><small class="text-muted">Преподавател: ${en.course.professor ? en.course.professor.lastName : '---'}</small></div>
                                    <div class="d-flex align-items-center">
                                        <input type="number" step="0.1" min="2" max="6" id="grade-${en.course.id}" class="form-control form-control-sm me-2" style="width: 70px" value="${en.grade || ''}" ${!isAdmin ? 'disabled' : ''}>
                                        ${isAdmin ? `<button class="btn btn-sm btn-primary" onclick="saveGrade(${studentId}, ${en.course.id})">Запиши</button>` : ''}
                                    </div>
                                </li>`;
                            });
                        });
                    new bootstrap.Modal(document.getElementById('coursesModal')).show();
                }
            });

            window.saveGrade = function(studentId, courseId) {
                const grade = document.getElementById(`grade-${courseId}`).value;
                fetch(`/api/students/${studentId}/courses/${courseId}/grade?grade=${grade}`, { method: 'PUT' })
                    .then(res => res.ok ? alert("✅ Оценката е запазена!") : alert("❌ Грешка при запис на оценка."));
            };
        });
    </script>
</body>
</html>
