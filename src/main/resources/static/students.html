<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студенти - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control, .form-select { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus, .form-select:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    
                    <a href="index.html" class="text-decoration-none">
    <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
</a>


                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span data-i18n="nav_dashboard">Главно табло</span></a>
                        <a href="students.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-people me-3"></i> <span data-i18n="nav_students">Студенти</span></a>
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span data-i18n="nav_courses">Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span data-i18n="nav_prof">Преподаватели</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-people me-2"></i> <span data-i18n="nav_students">Всички студенти</span></h1>
                    <button id="btn-new-student" class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm" onclick="openCreateModal()">
                        <i class="bi bi-person-plus-fill me-1"></i> <span data-i18n="btn_new_student">Нов Студент</span>
                    </button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-5">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-secondary" placeholder="Търси..." data-i18n="search_student">
                        </div>
                    </div>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4" data-i18n="th_id">ID</th>
                                <th class="py-3" data-i18n="th_name">Студент</th>
                                <th class="py-3" data-i18n="th_fac">Фак. Номер</th>
                                <th class="py-3" data-i18n="th_email">Имейл</th>
                                <th class="py-3" data-i18n="th_courses">Записани курсове</th>
                                <th class="py-3 text-end px-4" id="th-action" data-i18n="th_action">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="all-students-tbody">
                            </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <span id="page-info" class="text-muted small fw-bold">Страница 1 от 1</span>
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-outline-secondary btn-sm" id="prev-btn" onclick="changePage(-1)">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" id="next-btn" onclick="changePage(1)">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-person-badge me-2"></i> <span data-i18n="nav_students">Студент</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="errorAlert" class="alert alert-danger d-none small py-2 mb-3" role="alert"></div>
                    
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Име</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-muted small mb-1">Фамилия</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1" data-i18n="th_fac">Факултетен номер</label>
                            <input type="text" class="form-control" id="facultyNumber" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1" data-i18n="th_email">Имейл</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="text-muted small mb-1" data-i18n="th_courses">Записани курсове (Задръж Ctrl за избор на няколко)</label>
                            <select multiple class="form-select border-secondary" id="studentCourses" style="height: 100px;">
                                </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-success text-white fw-bold px-4" id="save-student-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script> 

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            let currentPage = 0;
            const pageSize = 10; 
            let currentKeyword = '';
            let allAvailableCourses = []; 
            let isAdmin = false; // ПРОМЕНЛИВА ЗА ПРАВАТА

            // 1. ИНИЦИАЛИЗАЦИЯ: Проверка на права -> Зареждане на курсове -> Зареждане на студенти
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    // Проверяваме дали е админ
                    isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                    
                    // Скриваме бутоните, ако е обикновен потребител
                    if (!isAdmin) {
                        let newBtn = document.getElementById('btn-new-student');
                        let actionTh = document.getElementById('th-action');
                        if(newBtn) newBtn.style.display = 'none';
                        if(actionTh) actionTh.style.display = 'none';
                    }

                    // След като знаем кой е, теглим курсовете
                    return fetch('/api/courses');
                })
                .then(res => res.json())
                .then(data => {
                    allAvailableCourses = data;
                    // Накрая чертаем таблицата
                    window.loadAllStudents(0);
                })
                .catch(err => {
                    console.error("Грешка при инициализация:", err);
                    // Ако има проблем, все пак се опитваме да заредим студентите (в safe mode)
                    window.loadAllStudents(0);
                });


            // ФУНКЦИЯ ЗА ЗАРЕЖДАНЕ ОТ СЪРВЪРА (Пагинация)
            window.loadAllStudents = function(page = 0) {
                let url = `/api/students?page=${page}&size=${pageSize}`;
                if (currentKeyword) {
                    url += `&keyword=${encodeURIComponent(currentKeyword)}`;
                }

                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        currentPage = data.number; 
                        renderTable(data.content); 
                        updatePaginationControls(data.totalPages);
                    })
                    .catch(err => console.error("Грешка:", err));
            };

            // ОБНОВЯВАНЕ НА БУТОНИТЕ ЗА СТРАНИЦИТЕ
            function updatePaginationControls(totalPages) {
                let displayPage = totalPages === 0 ? 0 : currentPage + 1;
                document.getElementById('page-info').innerHTML = `<i class="bi bi-file-earmark-text me-1"></i> ${displayPage} / ${totalPages}`;
                
                document.getElementById('prev-btn').disabled = (currentPage === 0);
                document.getElementById('next-btn').disabled = (currentPage >= totalPages - 1 || totalPages === 0);
            }

            // СМЯНА НА СТРАНИЦАТА
            window.changePage = function(offset) {
                loadAllStudents(currentPage + offset);
            };

            // РИСУВАНЕ НА ТАБЛИЦАТА С ПРОВЕРКА ЗА ПРАВА
            function renderTable(studentsToRender) {
                let tableBody = document.getElementById('all-students-tbody');
                tableBody.innerHTML = ''; 
                
                if (!studentsToRender || studentsToRender.length === 0) {
                    let colspan = isAdmin ? 6 : 5;
                    let noDataText = typeof t === 'function' ? t('no_data') : 'Няма данни';
                    tableBody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted py-4">${noDataText}</td></tr>`;
                    return;
                }

                studentsToRender.forEach(student => {
                    let coursesHtml = '';
                    if (student.courses && student.courses.length > 0) {
                        student.courses.forEach(c => {
                            coursesHtml += `<span class="badge bg-info text-dark me-1 mb-1 shadow-sm">${c.name}</span>`;
                        });
                    } else {
                        coursesHtml = '<span class="text-muted small fst-italic">-</span>';
                    }

                    let studentJson = encodeURIComponent(JSON.stringify(student));

                    // Динамична колона за управление: показва се само на Админ
                    let actionColumnHtml = '';
                    if (isAdmin) {
                        actionColumnHtml = `
                        <td class="text-end px-4">
                            <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${studentJson}')" title="Редактирай">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteStudent(${student.id})" title="Изтрий">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>`;
                    }

                    let row = `
                    <tr class="new-row">
                        <td class="px-4 py-3 text-secondary">#${student.id}</td>
                        <td class="fw-bold"><i class="bi bi-person-circle me-2 text-primary"></i> ${student.firstName} ${student.lastName}</td>
                        <td><span class="text-info">${student.facultyNumber}</span></td>
                        <td class="text-muted">${student.email}</td>
                        <td>${coursesHtml}</td>
                        ${actionColumnHtml}
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }

            // ТЪРСАЧКА НА ЖИВО
            document.getElementById('searchInput').addEventListener('input', function(e) {
                currentKeyword = e.target.value;
                window.loadAllStudents(0); 
            });

            // МОДАЛ ЗА СЪЗДАВАНЕ
            window.openCreateModal = function() {
                document.getElementById('studentForm').reset();
                document.getElementById('studentId').value = ''; 
                document.getElementById('errorAlert').classList.add('d-none');
                
                let courseSelect = document.getElementById('studentCourses');
                courseSelect.innerHTML = '';
                allAvailableCourses.forEach(c => {
                    courseSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });

                new bootstrap.Modal(document.getElementById('studentModal')).show();
            };

            // МОДАЛ ЗА РЕДАКТИРАНЕ
            window.openEditModal = function(encodedStudent) {
                let student = JSON.parse(decodeURIComponent(encodedStudent));
                document.getElementById('studentId').value = student.id;
                document.getElementById('firstName').value = student.firstName;
                document.getElementById('lastName').value = student.lastName;
                document.getElementById('facultyNumber').value = student.facultyNumber;
                document.getElementById('email').value = student.email;
                
                let courseSelect = document.getElementById('studentCourses');
                courseSelect.innerHTML = '';
                allAvailableCourses.forEach(c => {
                    let isSelected = student.courses && student.courses.some(sc => sc.id === c.id);
                    courseSelect.innerHTML += `<option value="${c.id}" ${isSelected ? 'selected' : ''}>${c.name}</option>`;
                });

                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('studentModal')).show();
            };

            // ЗАПАЗВАНЕ НА СТУДЕНТ В БАЗАТА
            document.getElementById('save-student-btn').addEventListener('click', async function() {
                let id = document.getElementById('studentId').value;
                
                let selectedCourses = Array.from(document.getElementById('studentCourses').selectedOptions)
                                           .map(opt => ({ id: parseInt(opt.value) }));

                let studentData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    facultyNumber: document.getElementById('facultyNumber').value,
                    email: document.getElementById('email').value,
                    courses: selectedCourses
                };

                let url = id ? `/api/students/${id}` : '/api/students'; 
                let method = id ? 'PUT' : 'POST';

                try {
                    let response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(studentData)
                    });

                    if (!response.ok) {
                        let errorMsg = await response.text(); 
                        throw new Error(errorMsg || "Сървърна грешка.");
                    }

                    bootstrap.Modal.getInstance(document.getElementById('studentModal')).hide();
                    window.loadAllStudents(currentPage); 
                    
                } catch (error) {
                    let errorDiv = document.getElementById('errorAlert');
                    let cleanMsg = error.message;
                    try {
                        let parsed = JSON.parse(error.message);
                        if(parsed.message) cleanMsg = parsed.message;
                    } catch(e) {}

                    errorDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${cleanMsg}`;
                    errorDiv.classList.remove('d-none');
                }
            });

            // ИЗТРИВАНЕ НА СТУДЕНТ
            window.deleteStudent = function(id) {
                if(confirm('Сигурен ли си?')) {
                    fetch('/api/students/' + id, { method: 'DELETE' }).then(() => {
                        window.loadAllStudents(currentPage);
                    });
                }
            };
        });
    </script>
</body>
</html>
