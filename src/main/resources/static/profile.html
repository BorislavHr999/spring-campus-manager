<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моят Профил - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .card-custom { background-color: #1e1e1e; border-radius: 15px; border: 1px solid #3d3d3d; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
        .form-control:disabled { background-color: #1a1a1a; color: #6c757d; border-color: #333; cursor: not-allowed; }
        .profile-icon { font-size: 5rem; color: #0d6efd; text-shadow: 0 0 20px rgba(13, 110, 253, 0.4); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                    </a>
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span>Главно табло</span></a>
                        
                        <a href="profile.html" class="list-group-item list-group-item-action bg-primary text-white rounded border-0 fw-bold"><i class="bi bi-person-badge me-3"></i> <span>Моят профил</span></a>
                        
                        <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span>Студенти</span></a>
                        <a href="departments.html" id="nav-departments" class="list-group-item list-group-item-action bg-transparent text-light border-0 d-none"><i class="bi bi-building me-3"></i> <span>Факултети</span></a>
                        <a href="users.html" id="nav-users" class="list-group-item list-group-item-action bg-transparent text-light border-0 d-none">
    <i class="bi bi-shield-lock me-3"></i> <span>Акаунти</span>
</a>
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span>Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span>Преподаватели</span></a>
                        <a href="clubs.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-controller me-3"></i> <span>Студентски Клубове</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-person-badge me-2 text-primary"></i> <span>Настройки на профила</span></h1>
                </div>

                <div id="alertBox" class="alert d-none" role="alert"></div>

                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="card card-custom text-center p-4">
                            <i class="bi bi-person-circle profile-icon mb-3"></i>
                            <h3 class="fw-bold" id="displayFullName">Зареждане...</h3>
                            <p class="text-info mb-1"><i class="bi bi-mortarboard me-1"></i> <span id="displayFacultyNumber">---</span></p>
                            <p class="text-muted small"><i class="bi bi-building me-1"></i> <span id="displayDepartment">---</span></p>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card card-custom p-4">
                            <h5 class="mb-4 fw-light"><i class="bi bi-card-checklist me-2 text-primary"></i> Лични данни</h5>
                            <form id="profileForm">
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="small text-muted mb-1">Име (Само за четене)</label>
                                        <input type="text" class="form-control" id="profFirstName" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small text-muted mb-1">Фамилия (Само за четене)</label>
                                        <input type="text" class="form-control" id="profLastName" disabled>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="small text-info fw-bold mb-1"><i class="bi bi-envelope"></i> Имейл</label>
                                    <input type="email" class="form-control border-info" id="profEmail" required>
                                </div>

                                <h5 class="mb-3 mt-4 fw-light"><i class="bi bi-geo-alt me-2 text-warning"></i> Адрес за кореспонденция</h5>
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="small text-warning fw-bold mb-1">Град</label>
                                        <input type="text" class="form-control border-warning" id="profCity" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small text-warning fw-bold mb-1">Улица</label>
                                        <input type="text" class="form-control border-warning" id="profStreet" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small text-warning fw-bold mb-1">Държава</label>
                                        <input type="text" class="form-control border-warning" id="profCountry" required>
                                    </div>
                                </div>

                                <div class="text-end mt-4">
                                    <button type="button" class="btn btn-primary px-5 fw-bold rounded-pill shadow-sm" id="save-profile-btn">
                                        <i class="bi bi-floppy me-2"></i> Запази промените
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. Проверка дали потребителят е админ (за да покажем скритото меню)
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    if (user.roles && user.roles.includes('ROLE_ADMIN')) {
                        document.getElementById('nav-departments')?.classList.remove('d-none');
                    }
                });

            // 2. Зареждане на профила на студента
            function loadProfile() {
                fetch('/api/students/me')
                    .then(res => {
                        if (!res.ok) throw new Error("Вие сте администратор и нямате свързан студентски профил за редактиране.");
                        return res.json();
                    })
                    .then(student => {
                        // Попълване на визитката вляво
                        document.getElementById('displayFullName').textContent = `${student.firstName} ${student.lastName}`;
                        document.getElementById('displayFacultyNumber').textContent = `Фак. №: ${student.facultyNumber || 'Очаква се'}`;
                        document.getElementById('displayDepartment').textContent = student.department ? student.department.name : 'Няма катедра';

                        // Попълване на формата за редакция вдясно
                        document.getElementById('profFirstName').value = student.firstName;
                        document.getElementById('profLastName').value = student.lastName;
                        document.getElementById('profEmail').value = student.email;
                        
                        if(student.address) {
                            document.getElementById('profCity').value = student.address.city || '';
                            document.getElementById('profStreet').value = student.address.street || '';
                            document.getElementById('profCountry').value = student.address.country || '';
                        }
                    })
                    .catch(err => {
                        showAlert(err.message, 'danger');
                        document.getElementById('profileForm').style.opacity = '0.5';
                        document.querySelectorAll('#profileForm input, #profileForm button').forEach(el => el.disabled = true);
                    });
            }

            loadProfile();

            // 3. Запазване на промените
            document.getElementById('save-profile-btn').addEventListener('click', async function() {
                const btn = this;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Записване...';
                btn.disabled = true;

                const updatedData = {
                    email: document.getElementById('profEmail').value,
                    address: {
                        city: document.getElementById('profCity').value,
                        street: document.getElementById('profStreet').value,
                        country: document.getElementById('profCountry').value || 'България'
                    }
                };

                try {
                    let response = await fetch('/api/students/me', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedData)
                    });

                    let result = await response.json();

                    if (response.ok) {
                        showAlert("✅ " + result.message, 'success');
                        loadProfile(); // Презареждаме данните
                    } else {
                        showAlert("⚠️ " + (result.message || "Възникна грешка!"), 'warning');
                    }
                } catch (error) {
                    showAlert("❌ Грешка при връзката със сървъра.", 'danger');
                } finally {
                    btn.innerHTML = '<i class="bi bi-floppy me-2"></i> Запази промените';
                    btn.disabled = false;
                }
            });

            // Помощна функция за съобщения
            function showAlert(message, type) {
                const alertBox = document.getElementById('alertBox');
                alertBox.className = `alert alert-${type} alert-dismissible fade show shadow-sm`;
                alertBox.innerHTML = `
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                `;
                // Скролиране леко нагоре, за да се види съобщението
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
