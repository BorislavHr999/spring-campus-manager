<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моят Профил - CampusOS</title>
    <style>
        /* Тъмен дизайн, подобен на логин екрана ти */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .profile-container h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #0d6efd;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #aaaaaa;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0b5ed7;
        }
        .alert {
            display: none;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .alert.success { background-color: #198754; color: white; display: block; }
        .alert.error { background-color: #dc3545; color: white; display: block; }
    </style>
</head>
<body>

    <div class="profile-container">
        <h2>🎓 Моят Профил</h2>
        <div id="message" class="alert"></div>
        
        <form id="profileForm">
            <div class="form-group">
                <label>Имейл (Автоматичен)</label>
                <input type="email" id="email" disabled>
            </div>
            <div class="form-group">
                <label>Име</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Възраст</label>
                <input type="number" id="age" min="16" max="100">
            </div>
            <div class="form-group">
                <label>Факултетен номер</label>
                <input type="text" id="facultyNumber" placeholder="Напр. FAC1234">
            </div>
            <button type="submit">Запази промените</button>
        </form>
    </div>

    <script>
        // 1. Когато страницата зареди, веднага дърпаме данните от бекенда
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/students/me')
                .then(response => {
                    if (response.status === 401) {
                        window.location.href = '/login.html'; // Ако не е логнат, го гоним към логина
                        throw new Error('Моля, влезте в профила си.');
                    }
                    if (!response.ok) throw new Error('Грешка при зареждане на профила');
                    return response.json();
                })
                .then(data => {
                    // Попълваме полетата с данните от базата
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('firstName').value = data.firstName || '';
                    document.getElementById('lastName').value = data.lastName || '';
                    document.getElementById('age').value = data.age || '';
                    document.getElementById('facultyNumber').value = data.facultyNumber || '';
                })
                .catch(error => showMessage(error.message, 'error'));
        });

        // 2. Когато натиснем "Запази промените"
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault(); // Спираме презареждането на страницата
            
            // Събираме новите данни от полетата
            const updatedData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                age: parseInt(document.getElementById('age').value) || 0,
                facultyNumber: document.getElementById('facultyNumber').value
            };

            // Пращаме ги към сървъра с метода PUT
            fetch('/api/students/me', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            })
            .then(response => {
                if (!response.ok) throw new Error('Грешка при запазване');
                return response.json();
            })
            .then(data => showMessage('Профилът е обновен успешно! ✅', 'success'))
            .catch(error => showMessage(error.message, 'error'));
        });

        // Помощна функция за показване на съобщения (зелени/червени)
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'alert ' + type;
            setTimeout(() => msgDiv.className = 'alert', 3000); // Скрива се след 3 секунди
        }
    </script>
</body>
</html>
