<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клубове - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #20c997, #198754); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #20c997; box-shadow: none; }
        .club-desc { max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                    </a>
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span>Главно табло</span></a>
                        <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span>Студенти</span></a>
                        <a href="departments.html" id="nav-departments" class="list-group-item list-group-item-action bg-transparent text-light border-0 d-none"><i class="bi bi-building me-3"></i> <span>Факултети</span></a>
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span>Специалности</span></a>
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span>Преподаватели</span></a>
                        
                        <a href="clubs.html" class="list-group-item list-group-item-action bg-success text-white rounded border-0 fw-bold"><i class="bi bi-controller me-3"></i> <span>Студентски Клубове</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i>Изход</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <h1 class="h2 fw-light"><i class="bi bi-controller me-2 text-success"></i> <span>Студентски Клубове</span></h1>
                    <button id="btn-new-club" class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm d-none" onclick="openClubModal()">
                        <i class="bi bi-plus-lg me-1"></i> Нов Клуб
                    </button>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4">Име на Клуба</th>
                                <th class="py-3">Описание</th>
                                <th class="py-3 text-end px-4" id="th-action">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="clubs-tbody"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="clubModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-controller me-2 text-success"></i> Данни за Клуб</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="clubForm">
                        <input type="hidden" id="clubId">
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Име на клуба *</label>
                            <input type="text" class="form-control border-success" id="clubName" placeholder="напр. Клуб по Роботика" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small mb-1">Описание *</label>
                            <textarea class="form-control" id="clubDescription" rows="3" placeholder="С какво се занимава клубът..." required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-success text-white fw-bold px-4" id="save-club-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let isAdmin = false;

            // 1. Проверка на права
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                    
                    if (isAdmin) {
                        document.getElementById('nav-departments')?.classList.remove('d-none');
                        document.getElementById('btn-new-club')?.classList.remove('d-none');
                    }
                    
                    loadClubs();
                })
                .catch(err => {
                    console.error("Грешка:", err);
                    loadClubs();
                });

            // 2. Зареждане на клубовете
            window.loadClubs = function() {
                fetch('/api/clubs')
                    .then(res => res.json())
                    .then(clubs => {
                        let tbody = document.getElementById('clubs-tbody');
                        tbody.innerHTML = '';
                        
                        if (!clubs || clubs.length === 0) {
                            tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Все още няма създадени клубове.</td></tr>`;
                            return;
                        }

                        clubs.forEach(c => {
                            let actionHtml = '';
                            
                            if (isAdmin) {
                                let clubJson = encodeURIComponent(JSON.stringify(c));
                                actionHtml = `
                                    <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${clubJson}')"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteClub(${c.id})"><i class="bi bi-trash"></i></button>
                                `;
                            } else {
                                actionHtml = `
                                    <button class="btn btn-sm btn-outline-success rounded-pill px-3 shadow-sm" onclick="joinClub(${c.id})">
                                        <i class="bi bi-person-plus-fill me-1"></i> Включи се
                                    </button>
                                `;
                            }

                            let row = `
                            <tr>
                                <td class="px-4 py-3 fw-bold text-success"><i class="bi bi-bookmark-star-fill me-2"></i> ${c.name}</td>
                                <td class="club-desc text-light" title="${c.description}">${c.description}</td>
                                <td class="text-end px-4">${actionHtml}</td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    });
            };

            // 3. Отваряне на модали
            window.openClubModal = function() {
                document.getElementById('clubForm').reset();
                document.getElementById('clubId').value = '';
                new bootstrap.Modal(document.getElementById('clubModal')).show();
            };

            window.openEditModal = function(encodedClub) {
                let c = JSON.parse(decodeURIComponent(encodedClub));
                document.getElementById('clubId').value = c.id;
                document.getElementById('clubName').value = c.name;
                document.getElementById('clubDescription').value = c.description;
                new bootstrap.Modal(document.getElementById('clubModal')).show();
            };

            // 4. Запис и Триене (Админ)
            document.getElementById('save-club-btn').addEventListener('click', function() {
                const id = document.getElementById('clubId').value;
                const name = document.getElementById('clubName').value.trim();
                const description = document.getElementById('clubDescription').value.trim();

                if(!name || !description) { alert("Моля попълнете всички полета!"); return; }

                const url = id ? `/api/clubs/${id}` : '/api/clubs';
                const method = id ? 'PUT' : 'POST';

                fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                }).then(res => {
                    if(res.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('clubModal')).hide();
                        loadClubs();
                    } else alert("Грешка при запазване!");
                });
            });

            window.deleteClub = function(id) {
                if(confirm('Сигурни ли сте, че искате да изтриете този клуб?')) {
                    fetch('/api/clubs/' + id, { method: 'DELETE' }).then(() => loadClubs());
                }
            };

            // 5. Записване в клуб (Студент)
            window.joinClub = async function(clubId) {
                try {
                    let res = await fetch(`/api/clubs/${clubId}/join`, { method: 'POST' });
                    let data = await res.json();
                    
                    if(res.ok) alert("🎉 " + data.message);
                    else alert("⚠️ " + data.message);
                } catch (e) {
                    alert("Възникна грешка при записването.");
                }
            };
        });
    </script>
</body>
</html>
