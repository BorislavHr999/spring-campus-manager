<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-card { 
            background-color: #1e1e1e; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #3d3d3d; 
            padding: 2.5rem; 
            width: 100%; 
            max-width: 400px; 
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
        .input-group-text { background-color: #222; border-color: #4d4d4d; color: #aaa; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h2>
            <p class="text-muted small">Моля, въведете вашите данни за вход</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Грешно име или парола!
        </div>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small mb-1">Потребителско име</label>
                <div class="input-group shadow-sm">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small mb-1">Парола</label>
                <div class="input-group shadow-sm">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill shadow-sm mb-3 py-2">
                Вход в системата
            </button>
            <div class="text-center mt-3">
                <span class="text-muted small">Нямате акаунт?</span> 
                <a href="register.html" class="text-primary text-decoration-none small fw-bold">Регистрирайте се</a>
            </div>
        </form>
    </div>

    <script>
        // Проверяваме дали в URL-а има ?error (Spring добавя това автоматично при грешна парола)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error-alert').classList.remove('d-none');
        }
    </script>
</body>
</html>
