<!DOCTYPE html>
<html lang="bg" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Факултети - CampusOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e1e1e; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .text-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .table-custom { background-color: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .modal-content { background-color: #1e1e1e; border: 1px solid #3d3d3d; }
        .form-control { background-color: #2d2d2d; color: #fff; border: 1px solid #4d4d4d; }
        .form-control:focus { background-color: #3d3d3d; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div>
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="text-center mb-5 text-gradient"><i class="bi bi-mortarboard-fill"></i> CampusOS</h3>
                    </a>
                    
                    <div class="list-group list-group-flush gap-2 px-2">
                        <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-speedometer2 me-3"></i> <span data-i18n="nav_dashboard">Главно табло</span></a>
                        
                        <a href="profile.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-badge me-3"></i> <span data-i18n="nav_profile">Моят профил</span></a>
                        
                        <a href="students.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-people me-3"></i> <span data-i18n="nav_students">Студенти</span></a>
                        
                        <a href="departments.html" id="nav-departments" class="list-group-item list-group-item-action bg-primary text-white rounded border-0"><i class="bi bi-building me-3"></i> <span data-i18n="nav_departments">Факултети</span></a>
                        
                        <a href="users.html" id="nav-users" class="list-group-item list-group-item-action bg-transparent text-light border-0 d-none"><i class="bi bi-shield-lock me-3"></i> <span data-i18n="nav_users">Акаунти</span></a>
                        
                        <a href="courses.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-journal-code me-3"></i> <span data-i18n="nav_courses">Специалности</span></a>
                        
                        <a href="professors.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-person-workspace me-3"></i> <span data-i18n="nav_prof">Преподаватели</span></a>
                        
                        <a href="clubs.html" class="list-group-item list-group-item-action bg-transparent text-light border-0"><i class="bi bi-controller me-3"></i> <span data-i18n="nav_clubs">Студентски Клубове</span></a>
                    </div>
                </div>
                <div class="mt-auto px-3">
                    <hr class="border-secondary">
                    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm"><i class="bi bi-box-arrow-left me-2"></i><span data-i18n="nav_logout">Изход</span></a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom border-secondary">
                    <div>
                        <h1 class="h2 fw-light"><i class="bi bi-building me-2"></i> <span data-i18n="dept_manage_title">Управление на Факултети</span></h1>
                    </div>
                    <div>
                        <button id="btn-new-department" class="btn btn-outline-success btn-sm rounded-pill px-3 shadow-sm d-none" onclick="openDeptModal()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="btn_new_dept">Нов Факултет</span>
                        </button>
                    </div>
                </div>

                <div class="table-custom p-1 shadow mb-3">
                    <table class="table table-dark table-hover table-borderless align-middle mb-0">
                        <thead class="border-bottom border-secondary text-muted">
                            <tr>
                                <th class="py-3 px-4"><span data-i18n="th_id">ID</span></th>
                                <th class="py-3"><span data-i18n="th_dept_name">Име на Факултет</span></th>
                                <th class="py-3"><span data-i18n="th_dept_office">Офис (Кабинет)</span></th>
                                <th class="py-3 text-end px-4 admin-actions d-none"><span data-i18n="th_action">Управление</span></th>
                            </tr>
                        </thead>
                        <tbody id="dept-tbody"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="deptModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-building me-2"></i> <span data-i18n="dept_modal_title">Данни за Факултет</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="errorAlert" class="alert alert-danger d-none small py-2 mb-3" role="alert"></div>
                    <form id="deptForm">
                        <input type="hidden" id="deptId">
                        <div class="mb-3">
                            <label class="text-muted small mb-1" data-i18n="th_dept_name">Име на Факултета *</label>
                            <input type="text" class="form-control" id="deptName" placeholder="напр. Информатика" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-info small mb-1"><i class="bi bi-door-open"></i> <span data-i18n="th_dept_office">Офис / Кабинет</span> *</label>
                            <input type="text" class="form-control border-info" id="deptOffice" placeholder="напр. Кабинет 401" required>
                            <small class="text-muted d-block mt-1" data-i18n="dept_office_hint">Това ще се показва в падащите менюта.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
                    <button type="button" class="btn btn-success text-white fw-bold px-4" id="save-dept-btn">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script> <script>
        document.addEventListener("DOMContentLoaded", function() {
            let isAdmin = false;

            // 1. Проверка за Админ
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(user => {
                    isAdmin = user.roles && user.roles.includes('ROLE_ADMIN');
                    if (isAdmin) {
                        document.getElementById('btn-new-department').classList.remove('d-none');
                        document.querySelector('.admin-actions').classList.remove('d-none');
                        
                        // Показваме Акаунти (ако е админ)
                        let navUsers = document.getElementById('nav-users');
                        if (navUsers) navUsers.classList.remove('d-none');
                    }
                    loadDepartments();
                });

            // 2. Зареждане на таблицата
            window.loadDepartments = function() {
                fetch('/api/departments')
                    .then(res => res.json())
                    .then(data => {
                        let depts = data.content || data;
                        let tbody = document.getElementById('dept-tbody');
                        tbody.innerHTML = '';
                        
                        if (!depts || depts.length === 0) {
                            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted" data-i18n="loading">Няма намерени факултети</td></tr>`;
                            return;
                        }

                        depts.forEach(d => {
                            let deptJson = encodeURIComponent(JSON.stringify(d));
                            let officeText = d.office ? `<span class="text-info">${d.office}</span>` : '<span class="text-danger small">Няма офис (null)</span>';
                            
                            let row = `
                            <tr>
                                <td class="px-4 py-3 text-secondary">#${d.id}</td>
                                <td class="fw-bold text-white">${d.name}</td>
                                <td><i class="bi bi-door-open me-1 text-muted"></i> ${officeText}</td>
                                <td class="text-end px-4 admin-actions-row" style="display: ${isAdmin ? 'table-cell' : 'none'}">
                                    <button class="btn btn-outline-warning btn-sm rounded-circle me-1" onclick="openEditModal('${deptJson}')" title="Редактирай (Добави офис)"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteDept(${d.id})" title="Изтрий"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    });
            };

            // 3. Отваряне на модали
            window.openDeptModal = function() {
                document.getElementById('deptForm').reset();
                document.getElementById('deptId').value = '';
                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('deptModal')).show();
            };

            window.openEditModal = function(encodedDept) {
                let d = JSON.parse(decodeURIComponent(encodedDept));
                document.getElementById('deptId').value = d.id;
                document.getElementById('deptName').value = d.name;
                document.getElementById('deptOffice').value = d.office || '';
                
                document.getElementById('errorAlert').classList.add('d-none');
                new bootstrap.Modal(document.getElementById('deptModal')).show();
            };

            // 4. Изтриване
            window.deleteDept = function(id) {
                if(confirm('Сигурни ли сте? Всички свързани данни може да бъдат засегнати!')) {
                    fetch('/api/departments/' + id, { method: 'DELETE' })
                        .then(res => {
                            if(res.ok) loadDepartments();
                            else res.json().then(err => alert("Грешка: " + err.message));
                        });
                }
            };

            // 5. Запазване / Редакция
            document.getElementById('save-dept-btn').addEventListener('click', async function() {
                const id = document.getElementById('deptId').value;
                const name = document.getElementById('deptName').value.trim();
                const office = document.getElementById('deptOffice').value.trim();

                if (!name || !office) {
                    let err = document.getElementById('errorAlert');
                    err.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> Моля, попълнете Име и Офис!`;
                    err.classList.remove('d-none');
                    return;
                }

                const deptData = { name, office };
                const url = id ? `/api/departments/${id}` : '/api/departments';
                const method = id ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(deptData)
                    });

                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('deptModal')).hide();
                        loadDepartments();
                    } else {
                        const errData = await response.json();
                        alert("Грешка: " + errData.message);
                    }
                } catch (err) {
                    alert("Проблем с връзката към сървъра!");
                }
            });
        });
    </script>
</body>
</html>
